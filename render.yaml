databases:
  - name: rent-finder-db
    databaseName: rentfinder
    user: rentfinder
    plan: free

services:
  - type: web
    name: rent-finder-api
    plan: free
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    dockerCommand: sh -c "pnpm --filter @rent-finder/api prisma:migrate && node apps/api/dist/server.js"
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rent-finder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: nvidia/llama-3.1-nemotron-70b-instruct:free
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: nvidia/llama-3.1-nemotron-70b-instruct:free
      - key: CORS_ORIGIN
        value: "*"
      - key: APP_URL
        sync: false
