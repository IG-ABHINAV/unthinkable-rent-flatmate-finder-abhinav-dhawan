databases:
  - name: rent-finder-db
    databaseName: rentfinder
    user: rentfinder
    plan: free

services:
  - type: web
    name: rent-finder-api
    plan: free
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    releaseCommand: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rent-finder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGIN
        value: "*"
      - key: APP_URL
        sync: false
